name: Image building for fedora-bootc

on:
  push:
    branches:
      - main # Optimizes resource usage by only building on your primary branch

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial: Allows the runner to push to GHCR without using personal tokens

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4 # Updated to v4 for faster node execution

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Prepares the runner for advanced multi-layer caching

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Dynamically inserts your username
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically injected by GitHub

      - name: Build and Push System OCI Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile # Points to your local system blueprint
          push: true
          tags: ghcr.io/ecabott/fedora-bootc:latest
          # Keeps intermediate dnf layers in the GitHub Action cache storage
          cache-from: type=gha
          cache-to: type=gha,mode=max
